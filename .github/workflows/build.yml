name: Build

on:
  # Trigger manually from GitHub UI
  workflow_dispatch:
  
  # Trigger on push to main branch
  push:
    branches:
      - main
    paths:
      - '**.plist'
      - '**.app'
      - 'build.sh'
      - 'build.yml'
      - '.github/workflows/**'
      - 'Info.plist'
      - 'Frameworks/**'
      - 'PlugIns/**'

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Get version info
        id: version
        run: |
          VERSION=$(plutil -raw -key CFBundleShortVersionString Info.plist 2>/dev/null || echo "unknown")
          BUILD=$(plutil -raw -key CFBundleVersion Info.plist 2>/dev/null || echo "1")
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "build=${BUILD}" >> $GITHUB_OUTPUT
          echo "App Version: ${VERSION} (${BUILD})"
      
      - name: Create unsigned IPA
        run: |
          # Create Payload folder structure (Sidestore requirement)
          mkdir -p Payload/Replica.app
          
          # Copy all app contents into Payload/Replica.app/
          for item in *; do
            [[ "$item" == "mirror.ipa" ]] && continue
            [[ "$item" == "replica.ipa" ]] && continue
            [[ "$item" == "build.sh" ]] && continue
            [[ "$item" == "README.md" ]] && continue
            [[ "$item" == ".github" ]] && continue
            [[ "$item" == "Payload" ]] && continue
            [[ "$item" == "build" ]] && continue
            cp -r "$item" Payload/Replica.app/ 2>/dev/null || true
          done
          
          # Remove code signing
          find Payload/Replica.app -name "_CodeSignature" -type d -exec rm -rf {} + 2>/dev/null || true
          
          # Create IPA: zip the Payload folder
          zip -r mirror.ipa Payload
          ls -lh mirror.ipa
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mirror
          path: mirror.ipa
          retention-days: 30
      
      - name: Upload to Release (if tagged)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: mirror.ipa
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}